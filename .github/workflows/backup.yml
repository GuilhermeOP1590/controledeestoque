name: Sistema de Backup (Código + Banco Supabase)

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Todo dia à meia-noite

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar Ferramentas do PostgreSQL
        run: sudo apt-get install -y postgresql-client

      - name: Exportar Tabelas do Supabase (Dump)
        run: |
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" > backup_tabelas.sql
        
      - name: Criar Tag de Backup
        run: |
          TAG_NAME="backup-$(date +'%Y%m%d-%H%M%S')"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add backup_tabelas.sql
          git commit -m "Backup do banco incluído" || echo "Sem mudanças"
          git tag $TAG_NAME
          git push origin main
          git push origin $TAG_NAME

      - name: Manter apenas os 10 mais recentes
        run: |
          TAGS_PARA_DELETAR=$(git tag --sort=-creatordate | grep "^backup-" | tail -n +11)
          for tag in $TAGS_PARA_DELETAR; do
            git push origin --delete $tag
          done